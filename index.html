<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVIL DAD AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#05060c,#0f1220);
color:white;
display:flex;
justify-content:center;
}

.app{
width:420px;
padding:20px;
}

/* TITLE */

.title{
text-align:center;
font-size:24px;
font-weight:900;
letter-spacing:3px;
margin-bottom:18px;
color:#ff2e63;
text-shadow:0 0 10px #ff2e63;
}

/* BOX */

.box{
background:#121526;
border-radius:16px;
padding:16px;
margin-bottom:14px;
border:1px solid #2b3050;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
font-size:13px;
font-weight:bold;
color:#9aa2d6;
}

/* PREDICTION */

.predictionBox{
text-align:center;
}

#prediction{
font-size:48px;
font-weight:900;
margin-top:10px;
letter-spacing:2px;
}

.big{
color:#ff3b3b;
text-shadow:0 0 10px #ff3b3b;
}

.small{
color:#00ff9d;
text-shadow:0 0 10px #00ff9d;
}

.pattern{
font-size:12px;
margin-top:8px;
color:#9aa2d6;
}

/* HISTORY */

.history{
max-height:260px;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
color:#8d94c5;
padding:6px;
}

td{
padding:6px;
}

.win{
color:#00ff9d;
font-weight:bold;
}

.loss{
color:#ff3b3b;
font-weight:bold;
}

/* SCROLL */

.history::-webkit-scrollbar{
width:4px;
}

.history::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="title">EVIL DAD</div>

<div class="box topbar">
<div>Period: <span id="period">---</span></div>
<div>Timer: <span id="timer">--</span></div>
</div>

<div class="box predictionBox">

<div style="font-size:12px;color:#9aa2d6">NEXT OUTCOME</div>

<div id="prediction">WAIT</div>

<div class="pattern">
Pattern Used : <span id="pattern">---</span>
</div>

</div>

<div class="box history">

<table>

<thead>
<tr>
<th>PERIOD</th>
<th>PRED</th>
<th>NUM</th>
<th>RESULT</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script>

const API="https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

let savedPrediction=null;
let lastPeriod=null;

/* TIMER */

function startTimer(){

setInterval(()=>{

let now=new Date();

let sec=now.getUTCSeconds();
let remain=60-sec;

let h=now.getUTCHours();
let m=now.getUTCMinutes();

let total=h*60+m;

let date=new Intl.DateTimeFormat(
'en-GB',
{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'UTC'}
).format(now).replace(/\//g,'');

let period="1000"+(10001+total);

document.getElementById("period").innerText=date+period;
document.getElementById("timer").innerText=remain;

},1000);

}

/* PATTERN MATCH */

function similarity(a,b){

let match=0;

for(let i=0;i<a.length;i++){
if(a[i]==b[i])match++;
}

return match/a.length;

}

/* PREDICT */

function predict(results){

let present=results.slice(-6);

let matches=[];

for(let i=0;i<results.length-7;i++){

let past=results.slice(i,i+6);

let sim=similarity(present,past);

if(sim>=0.7){

matches.push(results[i+6]);

}

}

if(matches.length==0){

return{
pred:results[results.length-1]=="B"?"S":"B",
pattern:present.join("")
}

}

let b=matches.filter(x=>x=="B").length;
let s=matches.length-b;

return{
pred:b>s?"B":"S",
pattern:present.join("")
}

}

/* UPDATE */

async function update(){

let r=await fetch(API);
let j=await r.json();

let list=j.data.list;

let nums=list.map(x=>parseInt(x.number)).reverse();

let bs=nums.map(n=>n>=5?"B":"S");

let p=predict(bs);

let pred=p.pred=="B"?"BIG":"SMALL";

let el=document.getElementById("prediction");

el.innerText=pred;

el.className=p.pred=="B"?"big":"small";

document.getElementById("pattern").innerText=p.pattern;

let period=list[0].issueNumber;

if(lastPeriod && lastPeriod!=period){

let num=nums[nums.length-1];

let actual=num>=5?"BIG":"SMALL";

let win=savedPrediction==actual;

let row=`
<tr>
<td>${period.slice(-4)}</td>
<td>${savedPrediction}</td>
<td>${num}</td>
<td class="${win?'win':'loss'}">${win?'WIN':'LOSS'}</td>
</tr>
`;

document.getElementById("history").innerHTML=
row+document.getElementById("history").innerHTML;

}

savedPrediction=pred;
lastPeriod=period;

}

startTimer();

setInterval(update,5000);

</script>

</body>
</html>
