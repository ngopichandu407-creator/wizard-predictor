<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;}

.container{
  margin-top:40px;
}

button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  background:#00E5FF;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>KOH AI SYSTEM</h2>

<p id="period">PERIOD: --</p>
<p id="timer">TIMER: --</p>

<button onclick="showResult()">CHANGE</button>

<div class="result" id="resultBox"></div>

</div>

<script>

let currentPeriod = "";

/* UPDATE PERIOD + TIMER */
function updateClock(){

  const now = new Date();

  const year = now.getFullYear();
  const month = String(now.getMonth()+1).padStart(2,'0');
  const day = String(now.getDate()).padStart(2,'0');
  const hour = String(now.getHours()).padStart(2,'0');
  const minute = String(now.getMinutes()).padStart(2,'0');

  currentPeriod = year+month+day+hour+minute;

  const sec = now.getSeconds();
  const rem = 60 - sec;

  document.getElementById("period").innerText = "PERIOD: " + currentPeriod;
  document.getElementById("timer").innerText = "TIMER: " + rem;

  loadResult();

  setTimeout(updateClock,1000);
}
updateClock();

/* LOAD SAVED RESULT */
function loadResult(){
  let saved = localStorage.getItem("res_"+currentPeriod);

  if(saved){
    document.getElementById("resultBox").innerText = saved;
  }
}

/* CHANGE BUTTON */
function showResult(){

  let key = "res_"+currentPeriod;

  let existing = localStorage.getItem(key);

  if(existing){
    document.getElementById("resultBox").innerText = existing;
    return;
  }

  let value = Math.floor(Math.random()*10);
  let type = value >=5 ? "BIGG" : "SMALL";

  let output = type + " " + value;

  localStorage.setItem(key, output);

  document.getElementById("resultBox").innerText = output;
}

</script>

</body>
</html>
