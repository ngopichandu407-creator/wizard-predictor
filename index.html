<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern System FINAL</title>

<style>
body{margin:0;background:#0f111a;color:#fff;font-family:Arial}
.app{max-width:460px;margin:auto;padding:15px}
.card{background:#161925;padding:15px;border-radius:12px;margin-bottom:12px}
.center{text-align:center}
.pred{font-size:40px;font-weight:bold}
.BIG{color:#ff5555}
.SMALL{color:#50fa7b}
table{width:100%;font-size:12px;border-collapse:collapse}
th,td{padding:6px;text-align:center}
.win{color:#50fa7b;font-weight:bold}
.loss{color:#ff5555;font-weight:bold}
.status{font-size:12px;color:#9aa0b4}
</style>
</head>
<body>

<div class="app">

<div class="card center">
<h2>PRO PATTERN MATCH</h2>
<div id="timer">--</div>
</div>

<div class="card center">
<div>NEXT PREDICTION</div>
<div id="prediction" class="pred">LOADING</div>
<div id="status" class="status">Connecting...</div>
</div>

<div class="card">
<h3>WIN / LOSS TRACKER</h3>
<table>
<thead>
<tr>
<th>Period</th>
<th>Pred</th>
<th>Actual</th>
<th>Result</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

</div>

<script>

const API="https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

let lastResolvedPeriod=null;
let currentPrediction=null;

/* TIMER */
setInterval(()=>{
  const sec=new Date().getUTCSeconds();
  document.getElementById("timer").innerText=(60-sec)+"s";
},1000);


/* PATTERN CALCULATION */
function getPrediction(results){

  const active=results.slice(-6);
  let big=0,small=0,total=0;

  for(let i=0;i<results.length-6;i++){
    let match=0;
    for(let j=0;j<6;j++){
      if(results[i+j]===active[j]) match++;
    }

    if(match>=5){ // 90%
      total++;
      if(results[i+6]==="BIG") big++;
      else small++;
    }
  }

  if(total>=3){
    return big>=small?"BIG":"SMALL";
  }

  // fallback majority last 20
  const last20=results.slice(-20);
  const bigCount=last20.filter(x=>x==="BIG").length;
  const smallCount=last20.length-bigCount;

  return bigCount>=smallCount?"BIG":"SMALL";
}


/* MAIN UPDATE */
async function update(){

  try{

    const response=await fetch(API,{cache:"no-store"});
    if(!response.ok) throw new Error("Server");

    const data=await response.json();
    if(!data.data || !data.data.list) throw new Error("NoData");

    const list=data.data.list.slice(0,500);

    const nums=list.map(x=>parseInt(x.number)).reverse();
    const results=nums.map(n=>n>=5?"BIG":"SMALL");

    const prediction=getPrediction(results);

    document.getElementById("prediction").innerText=prediction;
    document.getElementById("prediction").className="pred "+prediction;
    document.getElementById("status").innerText="LIVE ✔";

    const latest=list[0];
    const latestPeriod=latest.issueNumber;

    if(latestPeriod!==lastResolvedPeriod){

      const actual=parseInt(latest.number)>=5?"BIG":"SMALL";
      const win=prediction===actual;

      const row=`
      <tr>
      <td>${latestPeriod.slice(-4)}</td>
      <td>${prediction}</td>
      <td>${actual}</td>
      <td class="${win?'win':'loss'}">${win?'WIN':'LOSS'}</td>
      </tr>`;

      document.getElementById("history").innerHTML=
      row+document.getElementById("history").innerHTML;

      lastResolvedPeriod=latestPeriod;
    }

  }catch(e){
    document.getElementById("status").innerText="SERVER BLOCK / API ISSUE";
  }

}

setInterval(update,4000);
update();

</script>

</body>
</html>
