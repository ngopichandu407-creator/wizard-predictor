<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVIL DAD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Arial;
background:#070912;
color:white;

display:flex;
justify-content:center;

}

.app{

width:100%;
max-width:420px;
padding:14px;

}

/* TITLE */

.title{

text-align:center;
font-size:24px;
font-weight:900;
letter-spacing:3px;
margin-bottom:12px;

color:#ff2e63;
text-shadow:0 0 10px #ff2e63;

}

/* BOX */

.box{

background:#121526;

border-radius:14px;

padding:14px;

margin-bottom:12px;

border:1px solid #2c3150;

}

/* TOP BAR */

.topbar{

display:flex;

justify-content:space-between;

font-size:13px;

color:#9aa2d6;

}

/* PREDICTION */

.prediction{

text-align:center;

}

#prediction{

font-size:44px;

font-weight:900;

margin-top:6px;

}

.big{

color:#ff4d4d;

text-shadow:0 0 8px #ff4d4d;

}

.small{

color:#00ffa2;

text-shadow:0 0 8px #00ffa2;

}

.pattern{

font-size:12px;

margin-top:6px;

color:#8a90c2;

}

/* HISTORY */

.history{

height:240px;

overflow-y:auto;

}

table{

width:100%;

border-collapse:collapse;

font-size:12px;

}

th{

color:#8b92c7;

padding:6px;

}

td{

padding:6px;

text-align:center;

}

.win{

color:#00ffa2;

font-weight:bold;

}

.loss{

color:#ff4d4d;

font-weight:bold;

}

/* SCROLL */

.history::-webkit-scrollbar{

width:4px;

}

.history::-webkit-scrollbar-thumb{

background:#444;

border-radius:10px;

}

</style>
</head>

<body>

<div class="app">

<div class="title">EVIL DAD</div>

<div class="box topbar">

<div>Period : <span id="period">---</span></div>

<div>Timer : <span id="timer">--</span></div>

</div>

<div class="box prediction">

<div style="font-size:12px;color:#9aa2d6">NEXT OUTCOME</div>

<div id="prediction">WAIT</div>

<div class="pattern">

Pattern : <span id="pattern">---</span>

</div>

</div>

<div class="box history">

<table>

<thead>

<tr>

<th>PERIOD</th>
<th>PRED</th>
<th>NUM</th>
<th>RESULT</th>

</tr>

</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script>

const API="https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

let savedPrediction=null;

let lastPeriod=null;

/* TIMER */

function startTimer(){

setInterval(()=>{

let now=new Date();

let sec=now.getUTCSeconds();

let remain=60-sec;

let h=now.getUTCHours();

let m=now.getUTCMinutes();

let total=h*60+m;

let date=new Intl.DateTimeFormat(

'en-GB',

{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'UTC'}

).format(now).replace(/\//g,'');

let period="1000"+(10001+total);

document.getElementById("period").innerText=date+period;

document.getElementById("timer").innerText=remain;

},1000);

}

/* SIMILARITY */

function similarity(a,b){

let match=0;

for(let i=0;i<a.length;i++){

if(a[i]==b[i]) match++;

}

return match/a.length;

}

/* PREDICT */

function predict(results){

let present=results.slice(-6);

let matches=[];

for(let i=0;i<results.length-7;i++){

let past=results.slice(i,i+6);

let sim=similarity(present,past);

if(sim>=0.7){

matches.push(results[i+6]);

}

}

if(matches.length==0){

return{

pred:results[results.length-1]=="B"?"S":"B",

pattern:present.join("")

}

}

let b=matches.filter(x=>x=="B").length;

let s=matches.length-b;

return{

pred:b>s?"B":"S",

pattern:present.join("")

}

}

/* UPDATE */

async function update(){

let r=await fetch(API);

let j=await r.json();

let list=j.data.list;

let nums=list.map(x=>parseInt(x.number)).reverse();

let bs=nums.map(n=>n>=5?"B":"S");

let p=predict(bs);

let pred=p.pred=="B"?"BIG":"SMALL";

let el=document.getElementById("prediction");

el.innerText=pred;

el.className=p.pred=="B"?"big":"small";

document.getElementById("pattern").innerText=p.pattern;

let period=list[0].issueNumber;

if(lastPeriod && lastPeriod!=period){

let num=nums[nums.length-1];

let actual=num>=5?"BIG":"SMALL";

let win=savedPrediction==actual;

let row=

`<tr>
<td>${period.slice(-4)}</td>
<td>${savedPrediction}</td>
<td>${num}</td>
<td class="${win?'win':'loss'}">${win?'WIN':'LOSS'}</td>
</tr>`;

document.getElementById("history").innerHTML=

row+document.getElementById("history").innerHTML;

}

savedPrediction=pred;

lastPeriod=period;

}

startTimer();

setInterval(update,5000);

</script>

</body>
</html>
